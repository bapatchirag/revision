name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  extension:
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Derive version from tag
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          gh release download "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern 'revision-darwin-arm64' \
            --pattern 'revision-linux-amd64' \
            --dir dist

      - name: Prepare extension
        working-directory: extension
        run: |
          npm install
          cp ../README.md README.md
          cp ../LICENSE LICENSE
          npm version "${{ steps.meta.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Publish platform-specific and universal VSIXes
        working-directory: extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          set -e
          if [ -z "${VSCE_PAT:-}" ]; then
            echo "VSCE_PAT secret is not set; skipping Marketplace publish."
            exit 0
          fi

          mkdir -p bin

          # macOS (Apple Silicon)
          cp ../dist/revision-darwin-arm64 bin/revision && chmod +x bin/revision
          npx --yes @vscode/vsce@latest publish --target darwin-arm64 -p "$VSCE_PAT"

          # Linux (x64)
          cp ../dist/revision-linux-amd64 bin/revision && chmod +x bin/revision
          npx --yes @vscode/vsce@latest publish --target linux-x64 -p "$VSCE_PAT"

          # Universal fallback (no bundled binary; resolves from PATH)
          rm -rf bin
          npx --yes @vscode/vsce@latest publish -p "$VSCE_PAT"
